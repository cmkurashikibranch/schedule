      <div class="cal-hp-title">${Number(mm)}月${Number(dd)}日 休日設定</div>
      <button data-type="full" class="${current==='full'?'is-active':''}">休み（終日）</button>
      <button data-type="am"   class="${current==='am'  ?'is-active':''}">AM休</button>
      <button data-type="pm"   class="${current==='pm'  ?'is-active':''}">PM休</button>
      <button data-type=""     class="is-clear">解除</button>
    `;
    document.body.appendChild(pop);
    const r = anchorEl.getBoundingClientRect();
    let left = r.left + window.scrollX;
    let top  = r.bottom + window.scrollY + 4;
    const pw = pop.offsetWidth;
    const ph = pop.offsetHeight;
    if (left + pw > window.scrollX + window.innerWidth - 8) {
      left = window.scrollX + window.innerWidth - pw - 8;
    }
    if (top + ph > window.scrollY + window.innerHeight - 8) {
      top = r.top + window.scrollY - ph - 4;
    }
    pop.style.left = `${left}px`;
    pop.style.top  = `${top}px`;
    pop.querySelectorAll('button').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const t = btn.getAttribute('data-type');
        setHoliday(dateStr, t || null);
        closeHolidayPopover();
      };
    });
    setTimeout(() => {
      document.addEventListener('click', onDocClickClosePopover, true);
      document.addEventListener('keydown', onEscClosePopover, true);
    }, 0);
  }

  // ── カレンダーセルから予定追加 ─────────────────────────────
  let calAddForm = { category: 'admin', priority: 'mid', slot: 'anytime' };

  function closeCalAddForm() {
    const el = document.getElementById('cal-add-popover');
    if (el) el.remove();
    document.removeEventListener('click', onDocClickCloseCalAdd, true);
    document.removeEventListener('keydown', onEscCloseCalAdd, true);
  }
  function onDocClickCloseCalAdd(e) {
    if (e.target.closest('#cal-add-popover')) return;
    if (e.target.classList.contains('cal-cell-add-btn')) return;
    closeCalAddForm();
  }
  function onEscCloseCalAdd(e) { if (e.key === 'Escape') closeCalAddForm(); }

  function showCalAddForm(dateStr, anchorEl) {
    closeCalAddForm();
    closeHolidayPopover();
    calAddForm = { category: 'admin', priority: 'mid', slot: 'anytime' };
    const [yy, mm, dd] = dateStr.split('-');
    const dateLabel = `${Number(mm)}月${Number(dd)}日`;
    const catBtns = CATS.map(c =>
      `<button class="pill-btn${calAddForm.category===c?' sel-'+c:''}" data-cat="${c}" onclick="calAddSelectCat('${c}',this)">${CAT_LABEL[c]}</button>`
    ).join('');
    const priBtns = PRIS.map(p =>
      `<button class="pill-btn${calAddForm.priority===p?' sel-'+p:''}" data-pri="${p}" onclick="calAddSelectPri('${p}',this)">${PRI_LABEL[p]}</button>`
    ).join('');
    const slotBtns = [['morning','午前'],['afternoon','午後'],['anytime','いつでも']].map(([s,l]) =>
      `<button class="pill-btn${calAddForm.slot===s?' sel-admin':''}" data-slot="${s}" onclick="calAddSelectSlot('${s}',this)">${l}</button>`
    ).join('');
    const pop = document.createElement('div');
    pop.className = 'cal-add-popover';
    pop.id = 'cal-add-popover';
    pop.innerHTML = `
      <div class="cal-hp-title">${dateLabel} 予定を追加</div>
      <input id="cal-add-title" class="add-title-input" type="text" placeholder="タスク名を入力…"
        onkeydown="if(event.key==='Enter'){event.preventDefault();confirmCalAdd('${dateStr}');}if(event.key==='Escape')closeCalAddForm();"
        style="margin-bottom:8px;">
      <div class="add-row" style="margin-bottom:6px;"><span class="add-row-label">時間帯</span>${slotBtns}</div>
      <div class="add-row" style="margin-bottom:6px;"><span class="add-row-label">種別</span>${catBtns}</div>
      <div class="add-row" style="margin-bottom:8px;">
        <span class="add-row-label">優先</span>${priBtns}
        <span class="add-row-label" style="margin-left:6px">時間</span>
        <input id="cal-add-time" class="add-time-input" type="text" placeholder="例: 14:00">
      </div>
      <div class="add-actions">
        <button class="btn-ng" onclick="closeCalAddForm()">キャンセル</button>
        <button class="btn-ok" onclick="confirmCalAdd('${dateStr}')">追加</button>
      </div>`;
    document.body.appendChild(pop);
    const r = anchorEl.getBoundingClientRect();
    let left = r.left + window.scrollX;
    let top  = r.bottom + window.scrollY + 4;
    const pw = pop.offsetWidth || 260;
    const ph = pop.offsetHeight || 220;
    if (left + pw > window.scrollX + window.innerWidth - 8) left = window.scrollX + window.innerWidth - pw - 8;
    if (top + ph > window.scrollY + window.innerHeight - 8) top = r.top + window.scrollY - ph - 4;
    pop.style.left = `${left}px`;
    pop.style.top  = `${top}px`;
    setTimeout(() => {
      const inp = document.getElementById('cal-add-title');
      if (inp) inp.focus();
      document.addEventListener('click', onDocClickCloseCalAdd, true);
      document.addEventListener('keydown', onEscCloseCalAdd, true);
    }, 0);
  }

  function calAddSelectCat(cat, btn) {
    calAddForm.category = cat;
    btn.closest('.add-row').querySelectorAll('.pill-btn').forEach(b => {
      b.className = `pill-btn${b.dataset.cat === cat ? ' sel-'+cat : ''}`;
    });
  }
  function calAddSelectPri(pri, btn) {
    calAddForm.priority = pri;
    btn.closest('.add-row').querySelectorAll('.pill-btn').forEach(b => {
      b.className = `pill-btn${b.dataset.pri === pri ? ' sel-'+pri : ''}`;
    });
  }
  function calAddSelectSlot(slot, btn) {
    calAddForm.slot = slot;
    btn.closest('.add-row').querySelectorAll('.pill-btn').forEach(b => {
      b.className = `pill-btn${b.dataset.slot === slot ? ' sel-admin' : ''}`;
    });
  }

  function confirmCalAdd(dateStr) {
    const titleEl = document.getElementById('cal-add-title');
    const timeEl  = document.getElementById('cal-add-time');
    const title   = titleEl ? titleEl.value.trim() : '';
    if (!title) return;
    const time = timeEl ? timeEl.value.trim() || null : null;
    data.future.push({
      id: nextId++, title, date: dateStr,
      slot: calAddForm.slot, category: calAddForm.category,
      priority: calAddForm.priority, time,
    });
    closeCalAddForm();
    saveData();
    renderAll();
  }

  function renderMonthCalendar() {
    const titleEl = document.getElementById('month-title');
    const grid    = document.getElementById('month-grid');
    if (!titleEl || !grid) return;
    closeHolidayPopover();
    closeCalAddForm();
    renderRecurringPanel();
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth();
    titleEl.textContent = `${y}年${m + 1}月`;
    grid.innerHTML = '';
    const days = getMonthCalendarDays(y, m);
    const MAX_VISIBLE = 4;
    let monthEventCount = 0;
    const holidays = data.holidays || {};
    days.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      cell.dataset.date = d.dateStr;
      if (!d.inMonth) cell.classList.add('other-month');
      if (d.isToday)  cell.classList.add('today');
      if (d.dow === 0) cell.classList.add('sun');
      if (d.dow === 6) cell.classList.add('sat');
      const hType = holidays[d.dateStr] || null;
      if (hType === 'full') cell.classList.add('is-holiday-full');

      const num = document.createElement('div');
      num.className = 'cal-cell-num';
      num.title = '日付クリックで休日を設定';
      const numText = document.createElement('span');
      numText.textContent = d.date.getDate();
      num.appendChild(numText);
      if (hType) {
        const badge = document.createElement('span');
        badge.className = `cal-holiday-badge t-${hType}`;
        badge.textContent = HOLIDAY_BADGE[hType];
        num.appendChild(badge);
      }
      num.onclick = (e) => {
        e.stopPropagation();
        showHolidayPicker(num, d.dateStr);
      };
      cell.appendChild(num);

      const events    = getEventsForDate(d.dateStr);
      const recurEs   = getRecurringForDate(d.dateStr);
      if (d.inMonth) monthEventCount += events.length + recurEs.length;
      const evWrap = document.createElement('div');
      evWrap.className = 'cal-events';
      const allEvs = [
        ...events.map(e => ({ ...e, _recurring: false })),
        ...recurEs.map(e => ({ ...e, _recurring: true })),
      ];
      allEvs.slice(0, MAX_VISIBLE).forEach(ev =>
        evWrap.appendChild(ev._recurring ? recurringChip(ev) : calChip(ev))
      );
      if (allEvs.length > MAX_VISIBLE) {
        const more = document.createElement('div');
        more.className = 'cal-more';
        more.textContent = `+${allEvs.length - MAX_VISIBLE} 件`;
        evWrap.appendChild(more);
      }
      cell.appendChild(evWrap);
      if (d.dateStr > todayStr()) {
        const addBtn = document.createElement('button');
        addBtn.className = 'cal-cell-add-btn';
        addBtn.textContent = '＋';
        addBtn.title = 'この日に予定を追加';
        addBtn.onclick = (e) => {
          e.stopPropagation();
          showCalAddForm(d.dateStr, addBtn);
        };
        cell.appendChild(addBtn);
      }
      grid.appendChild(cell);
    });
    const cnt = document.getElementById('month-count');
    if (cnt) cnt.textContent = `${monthEventCount}件`;
    initCalDnd();
  }

  // ── 初期化 ────────────────────────────────────────────
  async function init() {
    const now = new Date();
    document.getElementById('today-date').textContent =
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${DAYS[now.getDay()]}）`;
    await loadData();
    renderAll();
  }

  // init() is called from onAuthStateChanged inside the Firebase IIFE (second <script> below).
  // The bare init() call has been removed to prevent a crash before the IIFE loads.

    // ── localStorage → Firestore migration ───────────────────
    async function checkLocalStorageMigration() {
      try {
        if (localStorage.getItem('care-schedule-v1-migrated') === '1') return;
        const raw = localStorage.getItem('care-schedule-v1');
        if (!raw) return;
        JSON.parse(raw); // validate JSON — throws if corrupt
      } catch {
        return;
      }

      const card = document.createElement('div');
      card.style.cssText = [
        'position:fixed;bottom:max(24px,env(safe-area-inset-bottom,0px) + 16px);',
        'left:50%;transform:translateX(-50%);',
        'background:var(--surface);border:1.5px solid var(--accent);',
        'border-radius:12px;padding:20px;z-index:8000;',
        'box-shadow:0 4px 20px rgba(0,0,0,0.4);',
        'width:min(360px,calc(100vw - 32px));',
      ].join('');
      card.innerHTML = `
        <p style="font-size:13px;color:var(--text);margin-bottom:4px;font-weight:600;">データの移行</p>
        <p style="font-size:12px;color:var(--text-2);margin-bottom:16px;line-height:1.5;">
          このデバイスに保存されているデータをクラウドに移行しますか？<br>
          ※移行後もローカルデータは保持されます
        </p>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button id="_mig_skip" type="button"
            style="padding:7px 14px;border-radius:6px;border:1px solid var(--border);
                   background:none;color:var(--text-2);cursor:pointer;font-size:12px;">
            今はしない
          </button>
          <button id="_mig_ok" type="button"
            style="padding:7px 14px;border-radius:6px;border:none;
                   background:var(--accent);color:#fff;cursor:pointer;
                   font-size:12px;font-weight:600;">
            クラウドに移行する
          </button>
        </div>
        <p id="_mig_status" style="font-size:11px;color:var(--text-2);margin-top:10px;min-height:14px;"></p>
      `;
      document.body.appendChild(card);

      document.getElementById('_mig_skip').onclick = () => card.remove();

      document.getElementById('_mig_ok').onclick = async () => {
        const okBtn    = document.getElementById('_mig_ok');
        const skipBtn  = document.getElementById('_mig_skip');
        const status   = document.getElementById('_mig_status');
        okBtn.disabled = true; skipBtn.disabled = true;
        status.textContent = '移行中…';
        try {
          const raw = localStorage.getItem('care-schedule-v1');
          const localData = JSON.parse(raw);
          // Migrate nextId to timestamp-based if old sequential
          if (!localData.nextId || localData.nextId < 1_000_000) {
            localData.nextId = Date.now();
          }
          localData.lastWriteTime = Date.now();
          // Save to Firestore FIRST — only remove localStorage after success
          await StorageAdapter.save(currentUser.uid, localData);
          localStorage.setItem('care-schedule-v1-migrated', '1');
          status.textContent = '移行が完了しました';
          setTimeout(async () => {
            card.remove();
            await init();
            renderAll();
          }, 1200);
        } catch (err) {
          status.textContent = '移行に失敗しました。再度お試しください。';
          status.style.color = 'var(--pri-high)';
          okBtn.disabled = false; skipBtn.disabled = false;
        }
      };
    }
  </script>
    </div><!-- /#app-screen -->
