<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本日のスケジュール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0F1220;
      --surface:   #1A1F35;
      --surface-2: #222840;
      --border:    rgba(255,255,255,0.08);
      --text:      #E2E8F5;
      --text-2:    #9BA5BF;
      --text-3:    #7A84A0;

      --cat-visit:          #14B8A6;
      --cat-visit-bg:       rgba(20,184,166,0.15);
      --cat-meeting:        #6366F1;
      --cat-meeting-bg:     rgba(99,102,241,0.15);
      --cat-admin:          #94A3B8;
      --cat-admin-bg:       rgba(148,163,184,0.15);
      --cat-training:       #F59E0B;
      --cat-training-bg:    rgba(245,158,11,0.15);
      --cat-dept:           #FB923C;
      --cat-dept-bg:        rgba(251,146,60,0.15);
      --cat-monitoring:     #A78BFA;
      --cat-monitoring-bg:  rgba(167,139,250,0.15);

      --pri-high: #F87171;
      --pri-mid:  #FBBF24;
      --pri-low:  #64748B;
      --accent:   #818CF8;
      --accent-bg:rgba(129,140,248,0.15);
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      background: rgba(15,18,32,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      will-change: transform;
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: baseline; gap: 14px; }
    .date-display {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .date-sub { font-size: 12px; color: var(--text-2); }
    .header-stats { display: flex; gap: 28px; }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
    }
    .stat-label { font-size: 10px; color: var(--text-2); margin-top: 3px; letter-spacing: 0.06em; }
    .s-visits  .stat-num { color: var(--cat-visit); }
    .s-meeting .stat-num { color: var(--cat-meeting); }
    .s-done    .stat-num { color: #22C55E; }

    /* ── Main ─────────────────────────────────────────── */
    .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* ── Section ──────────────────────────────────────── */
    .section { margin-bottom: 32px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-2);
      white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); white-space: nowrap; }

    /* ── Time grid ────────────────────────────────────── */
    .time-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .time-col { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
    .time-col-header {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .time-dot { width: 8px; height: 8px; border-radius: 50%; }
    .morning  .time-dot { background: var(--pri-mid); }
    .afternoon .time-dot { background: var(--accent); }
    .anytime  .time-dot { background: var(--text-3); }
    .time-col-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-2); }
    .time-col-sub { font-size: 10.5px; color: var(--text-3); margin-left: auto; }
    .time-col-body { padding: 10px 10px 0; display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .time-col-footer { padding: 8px 10px 10px; flex-shrink: 0; }

    /* ── Task card ────────────────────────────────────── */
    .task-card {
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 11px 13px;
      background: var(--surface);
      transition: box-shadow 0.15s, transform 0.15s, opacity 0.2s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.25s ease both;
    }
    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }
    .cat-visit::before       { background: var(--cat-visit); }
    .cat-meeting::before     { background: var(--cat-meeting); }
    .cat-admin::before       { background: var(--cat-admin); }
    .cat-training::before    { background: var(--cat-training); }
    .cat-dept::before        { background: var(--cat-dept); }
    .cat-monitoring::before  { background: var(--cat-monitoring); }

    .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.30); transform: translateY(-1px); }
    .task-card.done { opacity: 0.42; }

    /* ── Drag & Drop ──────────────────────────────────── */
    .task-card[draggable="true"] { cursor: grab; }
    .task-card[draggable="true"]:active { cursor: grabbing; }
    .task-card.dnd-dragging {
      opacity: 0.35;
      transform: none !important;
      box-shadow: none !important;
    }
    .dnd-insert-line {
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      margin: 2px 0;
      pointer-events: none;   /* dragleave チャッタリング防止 */
      flex-shrink: 0;
    }
    .time-col-body.dnd-over {
      background: rgba(129,140,248,0.07);
      border-radius: 8px;
    }
    .cal-chip[draggable="true"] { cursor: grab; }
    .cal-chip.dnd-dragging { opacity: 0.35; }
    .cal-cell.dnd-cal-over {
      background: rgba(129,140,248,0.12) !important;
      outline: 1px dashed var(--accent);
    }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text-3); }

    .task-top { display: flex; align-items: flex-start; gap: 9px; }

    /* Checkbox */
    .task-check {
      width: 18px; height: 18px;
      border: 1.5px solid rgba(255,255,255,0.20);
      border-radius: 5px;
      flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
      margin-top: 1px;
    }
    .task-check:hover { border-color: #22C55E; }
    .task-check.checked { background: #22C55E; border-color: #22C55E; }
    .task-check.checked::after {
      content: '';
      display: block;
      width: 9px; height: 5px;
      border-left: 2px solid white;
      border-bottom: 2px solid white;
      transform: rotate(-45deg) translateY(-1px);
    }

    .task-content { flex: 1; min-width: 0; }

    /* Title */
    .task-title {
      font-size: 13px; font-weight: 500;
      line-height: 1.45; margin-bottom: 6px;
      color: var(--text);
      cursor: text;
      word-break: break-all;
    }
    .task-title:hover {
      text-decoration: underline;
      text-decoration-style: dotted;
      text-decoration-color: var(--text-3);
    }

    .task-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    /* Tags */
    .tag {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: filter 0.12s;
      user-select: none;
    }
    .tag:hover { filter: brightness(0.9); }
    .tag-cat-visit       { background: var(--cat-visit-bg);       color: var(--cat-visit); }
    .tag-cat-meeting     { background: var(--cat-meeting-bg);     color: var(--cat-meeting); }
    .tag-cat-admin       { background: var(--cat-admin-bg);       color: var(--cat-admin); }
    .tag-cat-training    { background: var(--cat-training-bg);    color: var(--cat-training); }
    .tag-cat-dept        { background: var(--cat-dept-bg);        color: var(--cat-dept); }
    .tag-cat-monitoring  { background: var(--cat-monitoring-bg);  color: var(--cat-monitoring); }

    .pri-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      cursor: pointer; transition: transform 0.12s;
    }
    .pri-dot:hover { transform: scale(1.5); }
    .pri-high { background: var(--pri-high); }
    .pri-mid  { background: var(--pri-mid); }
    .pri-low  { background: var(--pri-low); }

    .task-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; color: var(--text-3);
      cursor: text;
    }
    .task-time:hover { text-decoration: underline dotted var(--text-3); }
    .task-time-add {
      font-size: 10px; color: var(--text-3);
      cursor: pointer; opacity: 0;
      transition: opacity 0.15s;
    }
    .task-card:hover .task-time-add { opacity: 1; }
    .task-time-add:hover { color: var(--accent); }

    .task-note {
      font-size: 11px; color: var(--text-2);
      margin-top: 5px; line-height: 1.55;
      padding-top: 5px;
      border-top: 1px solid var(--border);
      cursor: text;
    }
    .task-note:hover { text-decoration: underline dotted var(--text-3); }

    /* Delete button */
    .task-delete {
      width: 22px; height: 22px;
      border-radius: 5px; border: none;
      background: transparent; color: var(--text-3);
      cursor: pointer; font-size: 12px;
      opacity: 0;
      transition: opacity 0.15s, background 0.12s, color 0.12s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0; margin-top: 0;
    }
    .task-card:hover .task-delete { opacity: 1; }
    .task-delete:hover { background: rgba(248,113,113,0.15); color: #F87171; }

    .task-edit {
      width: 22px; height: 22px;
      border-radius: 5px; border: none;
      background: transparent; color: var(--text-3);
      cursor: pointer; font-size: 12px;
      opacity: 0;
      transition: opacity 0.15s, background 0.12s, color 0.12s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0; margin-top: 0;
    }
    .task-card:hover .task-edit { opacity: 1; }
    .task-edit:hover { background: var(--accent-bg); color: var(--accent); }

    /* Inline edit inputs */
    .inline-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      background: transparent;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      padding: 1px 2px;
      margin-bottom: 6px;
      display: block;
    }
    .inline-input-sm {
      border: none;
      border-bottom: 1.5px solid var(--accent);
      background: transparent;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text);
      outline: none;
      padding: 1px 2px;
      width: 90px;
    }
    .inline-input-note {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      background: transparent;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 11px;
      color: var(--text-2);
      outline: none;
      padding: 1px 2px;
      resize: none;
      overflow: hidden;
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid var(--border);
    }

    /* ── Add trigger & form ───────────────────────────── */
    .add-trigger {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: transparent;
      color: var(--text-3);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      text-align: center;
    }
    .add-trigger:hover { border-color: var(--accent); color: var(--accent); background: rgba(129,140,248,0.08); }

    .add-form-card {
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      background: var(--surface);
      box-shadow: 0 2px 10px rgba(129,140,248,0.20);
    }
    .add-title-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 3px 0 5px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: transparent;
      outline: none;
      margin-bottom: 10px;
      display: block;
    }
    .add-title-input:focus { border-bottom-color: var(--accent); }
    .add-title-input::placeholder { color: var(--text-3); }

    .add-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .add-row-label { font-size: 10px; color: var(--text-3); margin-right: 2px; letter-spacing: 0.05em; }

    .pill-btn {
      font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 4px;
      border: 1.5px solid transparent;
      cursor: pointer;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      transition: all 0.1s;
      background: var(--surface-2); color: var(--text-2);
    }
    .pill-btn:hover { border-color: rgba(255,255,255,0.15); }
    .pill-btn.sel-visit      { background: var(--cat-visit-bg);      color: var(--cat-visit);      border-color: var(--cat-visit); }
    .pill-btn.sel-meeting    { background: var(--cat-meeting-bg);    color: var(--cat-meeting);    border-color: var(--cat-meeting); }
    .pill-btn.sel-admin      { background: var(--cat-admin-bg);      color: var(--cat-admin);      border-color: var(--cat-admin); }
    .pill-btn.sel-training   { background: var(--cat-training-bg);   color: var(--cat-training);   border-color: var(--cat-training); }
    .pill-btn.sel-dept       { background: var(--cat-dept-bg);       color: var(--cat-dept);       border-color: var(--cat-dept); }
    .pill-btn.sel-monitoring { background: var(--cat-monitoring-bg); color: var(--cat-monitoring); border-color: var(--cat-monitoring); }
    .pill-btn.sel-high { background: rgba(248,113,113,0.15); color: var(--pri-high); border-color: var(--pri-high); }
    .pill-btn.sel-mid  { background: rgba(251,191,36,0.15);  color: var(--pri-mid);  border-color: var(--pri-mid); }
    .pill-btn.sel-low  { background: var(--surface-2); color: var(--pri-low); border-color: var(--pri-low); }

    .add-time-input {
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 3px 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
      background: transparent;
      outline: none;
      width: 80px;
    }
    .add-time-input:focus { border-bottom-color: var(--accent); }
    .add-time-input::placeholder { color: var(--text-3); font-size: 10px; }

    .add-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; }
    .btn-ok {
      background: var(--accent); color: white;
      border: none; border-radius: 5px;
      padding: 5px 14px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 11.5px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-ok:hover { opacity: 0.85; }
    .btn-ng {
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 5px 10px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 11.5px; cursor: pointer;
    }
    .btn-ng:hover { background: var(--bg); }

    /* ── Ongoing ──────────────────────────────────────── */
    .ongoing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .ongoing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      position: relative; overflow: hidden;
    }
    .ongoing-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--accent);
    }
    .ongoing-title {
      font-size: 13px; font-weight: 600;
      margin: 6px 0 10px; line-height: 1.4;
      cursor: text;
    }
    .ongoing-title:hover { text-decoration: underline dotted var(--text-3); }
    .progress-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }
    .ongoing-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .ongoing-deadline { font-size: 11px; color: var(--text-2); cursor: text; }
    .ongoing-deadline:hover { text-decoration: underline dotted var(--text-3); }
    .ongoing-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); }
    .ongoing-delete {
      position: absolute; top: 8px; right: 8px;
      width: 20px; height: 20px;
      border-radius: 4px; border: none;
      background: transparent; color: var(--text-3);
      cursor: pointer; font-size: 11px;
      opacity: 0; transition: opacity 0.15s, background 0.12s, color 0.12s;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .ongoing-card:hover .ongoing-delete { opacity: 1; }
    .ongoing-delete:hover { background: rgba(248,113,113,0.15); color: #F87171; }
    .progress-range {
      width: 100%; cursor: pointer;
      accent-color: var(--accent);
      margin-top: 4px;
    }
    .ongoing-add-btn {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 16px;
      background: transparent;
      color: var(--text-3);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .ongoing-add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(129,140,248,0.08); }

    /* ── Overdue ──────────────────────────────────────── */
    .overdue-list { display: flex; flex-direction: column; gap: 8px; }
    .overdue-card {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      position: relative;
    }
    .overdue-badge {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(129,140,248,0.15); color: var(--accent);
      white-space: nowrap; letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .overdue-title { font-size: 13px; font-weight: 500; flex: 1; cursor: text; }
    .overdue-title:hover { text-decoration: underline dotted var(--pri-high); }
    .overdue-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); white-space: nowrap; }
    .overdue-delete {
      width: 20px; height: 20px;
      border-radius: 4px; border: none;
      background: transparent; color: var(--pri-high);
      cursor: pointer; font-size: 11px;
      opacity: 0; transition: opacity 0.15s, background 0.12s, color 0.12s;
      display: flex; align-items: center; justify-content: center; padding: 0;
      flex-shrink: 0;
    }
    .overdue-card:hover .overdue-delete { opacity: 1; }
    .overdue-delete:hover { background: rgba(248,113,113,0.15); color: #F87171; }
    .overdue-add-btn {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 16px;
      background: transparent;
      color: var(--text-3);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .overdue-add-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

    .empty-state { padding: 18px; text-align: center; color: var(--text-3); font-size: 12px; }

    /* ── Animations ───────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 960px) {
      .time-grid { grid-template-columns: 1fr; }
      .header { padding: 14px 20px; flex-wrap: wrap; gap: 12px; }
      .main   { padding: 20px; }
    }

    /* ── 先の予定 ─────────────────────────────────────── */
    .future-list { display: flex; flex-direction: column; gap: 16px; }
    .future-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .future-group-date   { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-2); white-space: nowrap; }
    .future-group-line   { flex: 1; height: 1px; background: var(--border); }
    .future-group-count  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); white-space: nowrap; }
    .future-group-cards  { display: flex; flex-direction: column; gap: 7px; }
    .future-add-btn {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; padding: 10px 16px;
      background: transparent; color: var(--text-3);
      font-family: 'Inter', 'Noto Sans JP', sans-serif; font-size: 12px;
      cursor: pointer; width: 100%; text-align: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .future-add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(129,140,248,0.08); }
    .add-date-input {
      border: none; border-bottom: 1.5px solid var(--border);
      padding: 3px 4px; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text); background: transparent;
      outline: none; width: 140px;
      color-scheme: dark;
    }
    .add-date-input:focus { border-bottom-color: var(--accent); }
    .add-date-input::-webkit-calendar-picker-indicator {
      opacity: 1;
      cursor: pointer;
      filter: brightness(0) invert(1);
      padding: 4px 5px;
      border-radius: 5px;
      background-color: rgba(129, 140, 248, 0.25);
    }
    .add-date-input::-webkit-calendar-picker-indicator:hover {
      background-color: rgba(129, 140, 248, 0.5);
    }
    .slot-badge {
      font-size: 10px; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── ビュー切替タブ ───────────────────────────────── */
    .view-tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 9px;
      width: fit-content;
      margin: 0 auto 22px;
    }
    .view-tab {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-2);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 7px 18px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 12px rgba(129,140,248,0.30);
    }

    /* ── 月間カレンダー ───────────────────────────────── */
    .month-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .month-title {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-right: 4px;
      min-width: 130px;
    }
    .month-nav-btn {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .month-nav-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    .month-today-btn {
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 11.5px;
      font-weight: 600;
      padding: 0 12px;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .month-today-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

    .cal-weekrow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      overflow: hidden;
    }
    .cal-weekday {
      padding: 8px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-2);
      border-right: 1px solid var(--border);
    }
    .cal-weekday:last-child { border-right: none; }
    .cal-weekday.sun { color: #F87171; }
    .cal-weekday.sat { color: #818CF8; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(96px, 1fr);
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }
    .cal-cell {
      border-right: 1px solid var(--border);
      border-top: 1px solid var(--border);
      padding: 5px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 0;
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:nth-child(-n+7) { border-top: none; }
    .cal-cell.other-month { background: var(--surface-2); }
    .cal-cell.other-month .cal-cell-num { color: var(--text-3); }
    .cal-cell.today { background: rgba(129,140,248,0.15); }
    .cal-cell.today .cal-cell-num {
      color: var(--accent);
      font-weight: 700;
    }
    .cal-cell-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1;
      padding: 1px 2px;
    }
    .cal-cell.sun .cal-cell-num { color: #F87171; }
    .cal-cell.sat .cal-cell-num { color: #818CF8; }
    .cal-cell.other-month.sun .cal-cell-num { color: rgba(248,113,113,0.45); }
    .cal-cell.other-month.sat .cal-cell-num { color: rgba(129,140,248,0.45); }

    .cal-cell-num {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      align-self: flex-start;
      border-radius: 3px;
      transition: background 0.12s;
    }
    .cal-cell-num:hover { background: rgba(255,255,255,0.06); }
    .cal-holiday-badge {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 1px 5px;
      border-radius: 8px;
      background: rgba(248,113,113,0.20);
      color: #F87171;
      line-height: 1.3;
    }
    .cal-holiday-badge.t-am { background: rgba(245,158,11,0.20); color: #F59E0B; }
    .cal-holiday-badge.t-pm { background: rgba(129,140,248,0.20); color: #818CF8; }
    .cal-cell.is-holiday-full { background: rgba(248,113,113,0.08); }
    .cal-cell.is-holiday-full.today { background: rgba(248,113,113,0.12); }
    .cal-cell.is-holiday-full.other-month { background: rgba(248,113,113,0.05); }

    .cal-holiday-popover {
      position: absolute;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
    }
    .cal-holiday-popover .cal-hp-title {
      font-size: 10.5px;
      color: var(--text-2);
      letter-spacing: 0.06em;
      padding: 2px 6px 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .cal-holiday-popover button {
      font-family: inherit;
      font-size: 12.5px;
      text-align: left;
      padding: 6px 10px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text);
    }
    .cal-holiday-popover button:hover { background: var(--surface-2); }
    .cal-holiday-popover button.is-active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
    .cal-holiday-popover button.is-clear { color: var(--text-2); border-top: 1px solid var(--border); margin-top: 2px; padding-top: 8px; border-radius: 0 0 6px 6px; }
    .cal-holiday-popover button.is-clear:hover { background: rgba(248,113,113,0.15); color: #F87171; }

    .cal-events {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
      min-height: 0;
    }
    .cal-chip {
      font-size: 10.5px;
      line-height: 1.3;
      padding: 2px 5px 2px 7px;
      border-radius: 3px;
      background: var(--bg);
      color: var(--text);
      position: relative;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: filter 0.12s, transform 0.12s;
    }
    .cal-chip::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .cal-chip:hover { filter: brightness(0.96); transform: translateX(1px); }
    .cal-chip.cat-visit    { background: var(--cat-visit-bg); }
    .cal-chip.cat-visit::before    { background: var(--cat-visit); }
    .cal-chip.cat-meeting  { background: var(--cat-meeting-bg); }
    .cal-chip.cat-meeting::before  { background: var(--cat-meeting); }
    .cal-chip.cat-admin    { background: var(--cat-admin-bg); }
    .cal-chip.cat-admin::before    { background: var(--cat-admin); }
    .cal-chip.cat-training { background: var(--cat-training-bg); }
    .cal-chip.cat-training::before { background: var(--cat-training); }
    .cal-chip.cat-dept        { background: var(--cat-dept-bg); }
    .cal-chip.cat-dept::before        { background: var(--cat-dept); }
    .cal-chip.cat-monitoring  { background: var(--cat-monitoring-bg); }
    .cal-chip.cat-monitoring::before  { background: var(--cat-monitoring); }
    .cal-chip-time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      margin-right: 3px;
    }
    .cal-chip-pri {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .cal-chip-pri.pri-high { background: var(--pri-high); }
    .cal-chip-pri.pri-mid  { background: var(--pri-mid); }
    .cal-chip-pri.pri-low  { background: var(--pri-low); }

    .cal-more {
      font-size: 10px;
      color: var(--text-3);
      padding: 1px 5px;
      cursor: default;
    }

    @media (max-width: 720px) {
      .cal-grid { grid-auto-rows: minmax(70px, auto); }
      .cal-cell { padding: 3px 3px 4px; }
      .cal-chip { font-size: 9.5px; padding: 1px 4px 1px 6px; }
      .cal-cell-num { font-size: 10.5px; }
      .month-title { font-size: 17px; min-width: 100px; }
    }

    /* ── 定期予定パネル ───────────────────────────────── */
    .month-recurring-btn {
      height: 32px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text-2);
      cursor: pointer; font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 11.5px; font-weight: 600; padding: 0 12px;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .month-recurring-btn:hover,
    .month-recurring-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    .recurring-panel {
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(129,140,248,0.20);
    }
    .recurring-panel-title {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-2); text-transform: uppercase; margin-bottom: 12px;
    }
    .recurring-row {
      display: flex; align-items: center; gap: 12px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .recurring-row:last-of-type { border-bottom: none; }
    .recurring-row-label { font-size: 13px; font-weight: 500; min-width: 120px; }
    .recurring-row-auto  { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-2); }
    .recurring-panel-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; }
    .cal-recurring-badge {
      display: inline-block; font-size: 9px; font-weight: 700;
      background: rgba(255,255,255,0.12); border-radius: 2px;
      padding: 0 3px; margin-right: 3px;
      line-height: 1.6; vertical-align: middle;
    }

    /* ── Cal Add Btn ─────────────────────────────────── */
    .cal-cell-add-btn {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 18px; height: 18px;
      border-radius: 4px;
      border: none;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      z-index: 2;
    }
    .cal-cell:hover .cal-cell-add-btn { opacity: 1; }
    .cal-cell-add-btn:hover { background: var(--accent); color: white; }
    .cal-add-popover {
      position: absolute;
      z-index: 200;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(129,140,248,0.20);
      padding: 12px 14px;
      min-width: 280px;
    }
    .cal-add-popover .add-title-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 3px 0 5px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: transparent;
      outline: none;
      display: block;
    }
    .cal-add-popover .add-title-input:focus { border-bottom-color: var(--accent); }

    /* ── Task note-add ──────────────────────────────── */
    .task-note-add {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .task-card:hover .task-note-add { opacity: 1; }
    .task-note-add:hover { color: var(--accent); text-decoration: underline dotted; }

    /* ── 印刷ボタン ──────────────────────────────────── */
    .month-print-btn {
      height: 32px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text-2);
      cursor: pointer; font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 11.5px; font-weight: 600; padding: 0 12px;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .month-print-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

    .month-copy-btn {
      height: 32px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid rgba(129,140,248,0.4);
      background: rgba(129,140,248,0.12);
      color: var(--accent);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter','Noto Sans JP',sans-serif;
      transition: background 0.12s, border-color 0.12s;
    }
    .month-copy-btn:hover { background: rgba(129,140,248,0.22); border-color: var(--accent); }

    /* ── 印刷スタイル ─────────────────────────────────── */
    @media print {
      @page { size: A4 landscape; margin: 1.5cm; }

      /* ダークテーマ変数をライトに上書き */
      :root {
        --bg:       #ffffff;
        --surface:  #ffffff;
        --surface-2:#f5f5f5;
        --border:   #cccccc;
        --text:     #000000;
        --text-2:   #444444;
        --text-3:   #888888;
      }

      /* 印刷対象外を非表示 */
      .header,
      .view-tabs,
      #today-view,
      .month-nav-btn,
      .month-today-btn,
      .month-recurring-btn,
      .month-copy-btn,
      .month-print-btn,
      .section-line,
      .section-count,
      #recurring-panel-wrap,
      .cal-cell-add-btn,
      .cal-holiday-popover,
      .cal-add-popover { display: none !important; }

      /* 月間ビューを強制表示 */
      #month-view { display: block !important; }

      body { background: #fff; }
      .main { padding: 0; max-width: 100%; }
      .section { margin-bottom: 0; }

      /* 月タイトル */
      .month-toolbar {
        display: flex;
        justify-content: center;
        margin-bottom: 12px;
      }
      .month-title {
        font-size: 18px;
        text-align: center;
      }

      /* カレンダーグリッド */
      .cal-weekrow,
      .cal-grid {
        border-color: #ccc;
      }
      .cal-cell {
        border-color: #ccc;
        min-height: 80px;
      }
      .cal-grid { grid-auto-rows: minmax(80px, 1fr); }

      /* チップの背景色を強制印刷 */
      .cal-chip,
      .cal-holiday-badge {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .cal-chip { box-shadow: none; }

      /* その他 */
      .task-card, .ongoing-card, .overdue-card { box-shadow: none; }
    }

    /* ── Add memo input ──────────────────────────────── */
    .add-memo-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 3px 0 5px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 12px;
      color: var(--text-2);
      background: transparent;
      outline: none;
      resize: none;
      display: block;
      margin-bottom: 8px;
    }
    .add-memo-input:focus { border-bottom-color: var(--accent); }
    .add-memo-input::placeholder { color: var(--text-3); }

    /* ── Auth Loading Screen ───────────────────────────────── */
    #auth-loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .auth-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(129,140,248,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login Screen ───────────────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0; z-index: 9998;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      width: min(340px, calc(100vw - 32px));
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo { margin-bottom: 16px; }
    .login-title {
      font-size: 22px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .login-sub { font-size: 13px; color: var(--text-2); margin-bottom: 32px; line-height: 1.5; }
    .login-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 20px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .login-btn:hover { background: var(--accent-bg); border-color: var(--accent); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .login-error {
      margin-top: 16px; font-size: 12px; color: var(--pri-high);
      min-height: 16px; line-height: 1.5;
    }

    /* ── User Menu (header right) ───────────────────────────── */
    .user-menu { position: relative; }
    .user-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px 5px 6px;
      color: var(--text-2); cursor: pointer;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 12px; transition: background 0.12s;
    }
    .user-btn:hover { background: var(--surface-2); }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      object-fit: cover; background: var(--surface-2);
    }
    .user-avatar-fallback {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent-bg); color: var(--accent);
      font-size: 10px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .user-dropdown {
      position: absolute; right: 0; top: calc(100% + 6px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      min-width: 140px; max-width: calc(100vw - 32px); z-index: 200;
    }
    .user-dropdown-name {
      padding: 8px 12px 6px;
      font-size: 11px; color: var(--text-3);
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-dropdown button {
      display: block; width: 100%; text-align: left;
      padding: 8px 12px; background: none; border: none;
      color: var(--text); font-size: 13px; cursor: pointer;
      border-radius: 5px;
    }
    .user-dropdown button:hover { background: var(--surface-2); color: var(--pri-high); }

    /* ── Save Indicator ─────────────────────────────────────── */
    .save-indicator {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 3px 8px; border-radius: 5px;
      transition: opacity 0.3s;
    }
    .save-indicator.pending { color: var(--text-2); }
    .save-indicator.ok      { color: #4ade80; }
    .save-indicator.error   {

  <script>
  // ── 定数 ──────────────────────────────────────────────
  const CATS  = ['admin','monitoring','visit','meeting','training','dept'];
  const PRIS  = ['high','mid','low'];
  const PRI_ORDER = { high: 0, mid: 1, low: 2 };
  const CAT_LABEL = { visit:'訪問', meeting:'担当者会議', admin:'事務', monitoring:'モニタリング', training:'研修', dept:'社内行事' };
  const PRI_LABEL = { high:'高', mid:'中', low:'低' };
  const DAYS  = ['日','月','火','水','木','金','土'];
  const RECURRING_EVENTS = [
    { key: 'yamanakajuku', label: 'やまなか塾V3', category: 'training', auto: true },
    { key: 'bushokai_shacho',   label: '部署会（社長）',    category: 'dept', auto: false },
    { key: 'bushokai_dentatsu', label: '部署会（伝達）',    category: 'dept', auto: false },
    { key: 'bushokai_kyotaku',  label: '部署会（居宅会議）', category: 'dept', auto: false },
    { key: 'tomita',       label: '富田クラブ',   category: 'meeting',  auto: false },
    { key: 'keiei_1',      label: '部署会①',      category: 'dept',     auto: false },
    { key: 'keiei_2',      label: '部署会②',      category: 'dept',     auto: false },
    { key: 'keiei',        label: '経営会議',      category: 'meeting',  auto: false },
  ];

  let nextId = 300;
  let addingSlot = null;
  let addForm = { category:'admin', priority:'mid' };
  let addingOngoing = false;
  let addingOverdue = false;
  let addingFuture  = false;
  let addFutureForm = { category:'admin', priority:'mid', slot:'anytime' };
  let editingFutureId = null;
  let editFutureForm  = { category:'admin', priority:'mid', slot:'anytime' };

  let dndState        = null;   // { taskId, sourceSlot }
  let calDndFutureId  = null;
  let calChipDragging = false;  // calChip onclick 競合防止フラグ

  function sortByPriority(items) {
    return [...items].sort((a, b) => {
      const pa = PRI_ORDER[a.priority] ?? 1;
      const pb = PRI_ORDER[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      return (a.id || 0) - (b.id || 0);
    });
  }

  // 時刻文字列を「その日の分」に変換。解釈不能なら null
  function parseTimeToMinutes(s) {
    if (s == null) return null;
    const str = String(s).trim().replace(/[：]/g, ':');
    const m = str.match(/^(\d{1,2}):(\d{1,2})$/);
    if (!m) return null;
    const h = parseInt(m[1], 10);
    const mi = parseInt(m[2], 10);
    if (!Number.isFinite(h) || !Number.isFinite(mi)) return null;
    if (h < 0 || h > 23 || mi < 0 || mi > 59) return null;
    return h * 60 + mi;
  }

  // 時間順 → 優先度 → id の総合ソート。時間なしは下に。
  function sortTasks(items) {
    const hasManualOrder = items.some(t => t.order != null);
    return [...items].sort((a, b) => {
      if (hasManualOrder) {
        const oa = a.order ?? Infinity;
        const ob = b.order ?? Infinity;
        if (oa !== ob) return oa - ob;
      }
      const ta = parseTimeToMinutes(a.time);
      const tb = parseTimeToMinutes(b.time);
      if (ta != null && tb == null) return -1;
      if (ta == null && tb != null) return 1;
      if (ta != null && tb != null && ta !== tb) return ta - tb;
      const pa = PRI_ORDER[a.priority] ?? 1;
      const pb = PRI_ORDER[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      return (a.id || 0) - (b.id || 0);
    });
  }

  // ── データ ────────────────────────────────────────────
  let data = {
    today:    [],
    ongoing:  [],
    overdue:  [],
    future:   [],
    holidays: {},
    recurring: {
      yamanakajuku: { type: 'nth-weekday', n: 3, dow: 5 },
      bushokai_shacho: {}, bushokai_dentatsu: {}, bushokai_kyotaku: {}, tomita: {}, keiei_1: {}, keiei_2: {}, keiei: {},
    },
  };

  // ── Storage (Firestore) ───────────────────────────────
  // NOTE: var (not let) so that window.currentUser from the IIFE refers
  // to the same binding — top-level let does NOT create window.* properties
  var currentUser = null;
  var _saveTimer  = null;
  var _appInitialized = false;

  // No-op stubs — real implementations are set by the Firebase IIFE below.
  // These prevent crashes if saveData() fires before the IIFE has loaded.
  window.showSaveIndicator = function() {};
  window.showOfflineBanner = function() {};
  window.fbSignOutGlobal   = function() { return Promise.resolve(); };

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function buildSavePayload() {
    return {
      lastWriteTime: Date.now(),
      saveDate:  todayStr(),
      morning:   data.today.filter(t => t.slot === 'morning'),
      afternoon: data.today.filter(t => t.slot === 'afternoon'),
      anytime:   data.today.filter(t => t.slot === 'anytime'),
      ongoing:   data.ongoing,
      overdue:   data.overdue,
      future:    data.future,
      holidays:  data.holidays || {},
      recurring: data.recurring || {},
      nextId,
    };
  }

  function saveData() {
    showSaveIndicator('pending');
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => _flushSave(), 300);
  }

  async function _flushSave() {
    if (!currentUser) return;
    try {
      await StorageAdapter.save(currentUser.uid, buildSavePayload());
      showSaveIndicator('ok');
    } catch (err) {
      console.error('Firestore save failed:', err);
      showSaveIndicator('error');
    }
  }

  function defaultData() {
      return {
        today:[], ongoing:[], overdue:[], future:[], holidays:{},
        recurring:{
          yamanakajuku:{type:'nth-weekday',n:3,dow:5},
          bushokai_shacho:{}, bushokai_dentatsu:{}, bushokai_kyotaku:{},
          tomita:{}, keiei_1:{}, keiei_2:{}, keiei:{},
        },
      };
    }

    async function loadData() {
      const today = todayStr();
      let saved = null;
      try {
        saved = await StorageAdapter.load(currentUser.uid);
      } catch (err) {
        if (err.code === 'permission-denied') {
          // This account is not on the allowlist — sign out and show clear message
          await fbSignOutGlobal();
          const errEl = document.getElementById('login-error');
          if (errEl) errEl.textContent = 'このアカウントはアクセスできません。登録されたアカウントでログインしてください。';
          return;
        }
        console.error('Firestore load failed:', err);
        showOfflineBanner();
        data = defaultData();
        return;
      }

      if (!saved) {
        data = defaultData();
        await checkLocalStorageMigration();
        return;
      }

      // Migrate legacy sequential nextId (< 1,000,000) to timestamp-based
      nextId = (!saved.nextId || saved.nextId < 1_000_000) ? Date.now() : saved.nextId;

      data.future   = saved.future   || [];
      data.holidays = saved.holidays || {};
      data.recurring = saved.recurring || {};
      if (!data.recurring.yamanakajuku) data.recurring.yamanakajuku = { type: 'nth-weekday', n: 3, dow: 5 };
      if (!data.recurring.bushokai_shacho)   data.recurring.bushokai_shacho   = {};
      if (!data.recurring.bushokai_dentatsu) data.recurring.bushokai_dentatsu = {};
      if (!data.recurring.bushokai_kyotaku)  data.recurring.bushokai_kyotaku  = {};
      if (!data.recurring.tomita)   data.recurring.tomita   = {};
      if (!data.recurring.keiei_1) {
        data.recurring.keiei_1 = data.recurring.keiei || {};
      }
      if (!data.recurring.keiei_2) data.recurring.keiei_2 = {};
      if (!data.recurring.keiei)   data.recurring.keiei   = {};

      if (saved.saveDate === today) {
        data.today   = [...(saved.morning||[]), ...(saved.afternoon||[]), ...(saved.anytime||[])];
        data.ongoing = saved.ongoing || [];
        data.overdue = saved.overdue || [];
      } else {
        const prev = [
          ...(saved.morning   || []),
          ...(saved.afternoon || []),
          ...(saved.anytime   || []),
        ];
        data.today = prev
          .filter(t => t && t.done !== true)
          .map(t => ({ ...t, done: false }));
        data.ongoing = saved.ongoing || [];
        data.overdue = saved.overdue || [];
      }
      promoteFuture();
    }

  // ── 定期予定 ──────────────────────────────────────────
  function nthWeekday(year, month, n, dow) {
    const first = new Date(year, month, 1);
    const diff  = (dow - first.getDay() + 7) % 7;
    return 1 + diff + (n - 1) * 7;
  }

  function getRecurringForDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const monthKey  = `${y}-${String(m).padStart(2,'0')}`;
    const rec       = data.recurring || {};
    const results   = [];
    RECURRING_EVENTS.forEach(ev => {
      let day;
      if (ev.auto) {
        day = nthWeekday(y, m - 1, 3, 5);
      } else {
        day = (rec[ev.key] || {})[monthKey] ?? null;
      }
      if (day === d) results.push(ev);
    });
    return results;
  }

  let recurringPanelOpen = false;

  function toggleRecurringPanel() {
    recurringPanelOpen = !recurringPanelOpen;
    const btn = document.getElementById('recurring-panel-btn');
    if (btn) btn.classList.toggle('active', recurringPanelOpen);
    renderRecurringPanel();
  }

  function renderRecurringPanel() {
    const wrap = document.getElementById('recurring-panel-wrap');
    if (!wrap) return;
    if (!recurringPanelOpen) { wrap.innerHTML = ''; return; }
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth() + 1;
    const monthKey = `${y}-${String(m).padStart(2,'0')}`;
    const rec = data.recurring || {};
    const autoDay   = nthWeekday(y, m - 1, 3, 5);
    const autoDate  = new Date(y, m - 1, autoDay);
    const autoLabel = `自動: ${m}月${autoDay}日（${DAYS[autoDate.getDay()]}）`;
    const maxDay    = new Date(y, m, 0).getDate();
    const minDate   = `${y}-${String(m).padStart(2,'0')}-01`;
    const maxDate   = `${y}-${String(m).padStart(2,'0')}-${String(maxDay).padStart(2,'0')}`;

    const rows = RECURRING_EVENTS.map(ev => {
      if (ev.auto) {
        return `<div class="recurring-row">
          <span class="recurring-row-label">${esc(ev.label)}</span>
          <span class="recurring-row-auto">${autoLabel}</span>
        </div>`;
      }
      const day = (rec[ev.key] || {})[monthKey] ?? null;
      const val = day ? `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}` : '';
      return `<div class="recurring-row">
        <span class="recurring-row-label">${esc(ev.label)}</span>
        <input id="rec-inp-${ev.key}" type="date" class="add-date-input"
          min="${minDate}" max="${maxDate}" value="${val}" style="width:155px;">
      </div>`;
    }).join('');

    wrap.innerHTML = `<div class="recurring-panel">
      <div class="recurring-panel-title">${y}年${m}月の定期予定</div>
      ${rows}
      <div class="recurring-panel-actions">
        <button class="btn-ng" onclick="toggleRecurringPanel()">閉じる</button>
        <button class="btn-ok" onclick="saveRecurringPanel()">保存</button>
      </div>
    </div>`;
  }

  function saveRecurringPanel() {
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth() + 1;
    const monthKey = `${y}-${String(m).padStart(2,'0')}`;
    const rec = data.recurring;
    ['bushokai_shacho','bushokai_dentatsu','bushokai_kyotaku','tomita','keiei_1','keiei_2','keiei'].forEach(key => {
      const inp = document.getElementById(`rec-inp-${key}`);
      if (!inp) return;
      if (!rec[key]) rec[key] = {};
      if (inp.value) {
        rec[key][monthKey] = new Date(inp.value + 'T00:00:00').getDate();
      } else {
        delete rec[key][monthKey];
      }
    });
    saveData();
    recurringPanelOpen = false;
    const btn = document.getElementById('recurring-panel-btn');
    if (btn) btn.classList.remove('active');
    renderRecurringPanel();
    renderMonthCalendar();
  }

  function promoteFuture() {
    const today   = todayStr();
    const promote  = data.future.filter(f => f.date <= today);
    data.future    = data.future.filter(f => f.date > today);
    promote.forEach(f => {
      data.today.push({
        id: f.id, title: f.title, category: f.category,
        priority: f.priority, time: f.time || null,
        slot: f.slot, done: false,
      });
    });
    if (promote.length > 0) saveData();
  }

  // ── ユーティリティ ────────────────────────────────────
  function esc(s) {
    return String(s||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── タスク操作 ────────────────────────────────────────
  function toggleDone(id) {
    const t = data.today.find(t => t.id === id);
    if (t) { t.done = !t.done; saveData(); renderAll(); }
  }

  function cycleCategory(id, e) {
    e.stopPropagation();
    const t = data.today.find(t => t.id === id);
    if (!t) return;
    t.category = CATS[(CATS.indexOf(t.category) + 1) % CATS.length];
    saveData(); renderAll();
  }

  function cyclePriority(id, e) {
    e.stopPropagation();
    const t = data.today.find(t => t.id === id);
    if (!t) return;
    t.priority = PRIS[(PRIS.indexOf(t.priority) + 1) % PRIS.length];
    saveData(); renderAll();
  }

  function deleteTask(id, e) {
    e.stopPropagation();
    data.today = data.today.filter(t => t.id !== id);
    saveData(); renderAll();
  }

  // ── インライン編集 ────────────────────────────────────
  function editTitle(id, el) {
    const t = data.today.find(t => t.id === id);
    if (!t) return;
    const inp = document.createElement('input');
    inp.className = 'inline-input';
    inp.value = t.title;
    inp.onblur = () => { if (inp.value.trim()) t.title = inp.value.trim(); saveData(); renderAll(); };
    inp.onkeydown = e => {
      if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      if (e.key === 'Escape') renderAll();
    };
    el.replaceWith(inp);
    inp.focus(); inp.select();
  }

  function editTime(id, el) {
    const t = data.today.find(t => t.id === id);
    if (!t) return;
    const inp = document.createElement('input');
    inp.className = 'inline-input-sm';
    inp.value = t.time || '';
    inp.placeholder = '例: 13:00';
    inp.onblur = () => { t.time = inp.value.trim() || null; saveData(); renderAll(); };
    inp.onkeydown = e => {

      if (e.key === 'Escape') renderAll();

    el.replaceWith(inp);
    inp.focus(); inp.select();

    inp.value = t.note || '';
    inp.rows = 2;
    inp.onblur = () => { t.note = inp.value.trim() || null; saveData(); renderAll(); };

  function confirmAdd(slot) {
    const form = document.getElementById(`add-form-${slot}`);
    const title = form.querySelector('.add-title-input').value.trim();
    if (!title) return;
    const time  = form.querySelector('.add-time-input').value.trim() || null;
    const note = slot === 'anytime'
      ? (form.querySelector('.add-memo-input')?.value.trim() || null)
      : null;
    const newTask = { id: nextId++, title, category: addForm.category, priority: addForm.priority, time, slot, done: false, note };
    // 当スロットに手動順序がある場合は末尾の order を引き継ぐ
    const slotItems = data.today.filter(t => t.slot === slot);
    if (slotItems.some(t => t.order != null)) {
      const maxOrder = Math.max(...slotItems.map(t => t.order ?? 0));
      newTask.order = maxOrder + 1;
    }
    data.today.push(newTask);
    addingSlot = null;
    saveData(); renderAll();

    el.dataset.taskId = t.id;
    const timeHtml = t.time
      ? `<span class="task-time" onclick="editTime(${t.id},this)">${esc(t.time)}</span>`
      : `<span class="task-time-add" onclick="editTime(${t.id},this)">＋時間</span>`;

      ? `<div class="task-note" onclick="editNote(${t.id},this)">${esc(t.note)}</div>`

          ? `<div class="task-note-add" onclick="editNote(${t.id},this)">＋ メモを追加</div>`

      <div class="task-top">
        <div class="task-check${t.done?' checked':''}" onclick="toggleDone(${t.id})"></div>
        <div class="task-content">
          <div class="task-title" onclick="editTitle(${t.id},this)">${esc(t.title)}</div>
          <div class="task-meta">
            <span class="tag tag-cat-${t.category}" onclick="cycleCategory(${t.id},event)" title="クリックでカテゴリ変更">${CAT_LABEL[t.category]}</span>
            <span class="pri-dot pri-${t.priority}" onclick="cyclePriority(${t.id},event)" title="クリックで優先度変更"></span>
            ${timeHtml}
          </div>
          ${noteHtml}
        </div>
        <button class="task-delete" onclick="deleteTask(${t.id},event)">✕</button>
      </div>`;

  // ── 全体再描画 ────────────────────────────────────────
  function renderAll() {
    if (dndState) return;   // D&D 操作中は DOM を再構築しない
    // 今日のタスク
    ['morning','afternoon','anytime'].forEach(slot => {
      const body   = document.getElementById(`${slot}-tasks`);
      const footer = document.getElementById(`${slot}-footer`);
      body.innerHTML = '';
      const items = sortTasks(data.today.filter(t => t.slot === slot));
      if (items.length === 0) body.innerHTML = '<div class="empty-state">予定なし</div>';
      else items.forEach(t => body.appendChild(taskCard(t)));
      footer.innerHTML = '';
      footer.appendChild(addingSlot === slot ? addFormEl(slot) : addTriggerEl(slot));
    });

    // 継続タスク
    const og = document.getElementById('ongoing-tasks');
    og.innerHTML = '';
    data.ongoing.forEach(t => og.appendChild(ongoingCard(t)));
    if (addingOngoing) {
      og.appendChild(ongoingAddFormEl());
    } else {
      const btn = document.createElement('button');
      btn.className = 'ongoing-add-btn';
      btn.textContent = '＋ 継続タスクを追加';
      btn.onclick = showOngoingAdd;
      og.appendChild(btn);
    }
    document.getElementById('ongoing-count').textContent = `${data.ongoing.length}件`;

    // 期限超過
    const od = document.getElementById('overdue-tasks');
    od.innerHTML = '';
    if (data.overdue.length === 0 && !addingOverdue) {
      od.innerHTML = '<div class="empty-state">なし</div>';
    } else {
      data.overdue.forEach(t => od.appendChild(overdueCard(t)));
    }
    if (addingOverdue) {
      od.appendChild(overdueAddFormEl());
    } else {
      const btn = document.createElement('button');
      btn.className = 'overdue-add-btn';
      btn.textContent = '＋ 追加';
      btn.onclick = showOverdueAdd;
      od.appendChild(btn);
    }
    document.getElementById('overdue-count').textContent = `${data.overdue.length}件`;

    renderFuture();
    updateStats();
    initDailyDnd();

    if (typeof activeView !== 'undefined' && activeView === 'month') {
      renderMonthCalendar();
    }
  }

    const tomorrow = (() => {

  function renderFuture() {
    const el = document.getElementById('future-tasks');
    el.innerHTML = '';

    const sorted = [...data.future].sort((a, b) => a.date.localeCompare(b.date));

    if (sorted.length === 0 && !addingFuture) {
      el.innerHTML = '<div class="empty-state">先の予定なし</div>';
    } else {
      const groups = {};
      sorted.forEach(f => {
        if (!groups[f.date]) groups[f.date] = [];
        groups[f.date].push(f);
      });
      Object.entries(groups).forEach(([date, items]) => {
        const d = new Date(date + 'T00:00:00');
        const label = `${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;
        const group = document.createElement('div');
        group.className = 'future-group';
        const header = document.createElement('div');
        header.className = 'future-group-header';
        header.innerHTML = `
          <span class="future-group-date">${label}</span>
          <span class="future-group-line"></span>
          <span class="future-group-count">${items.length}件</span>`;
        const cards = document.createElement('div');
        cards.className = 'future-group-cards';
        sortTasks(items).forEach(f => cards.appendChild(futureCardEl(f)));
        group.appendChild(header);
        group.appendChild(cards);
        el.appendChild(group);
      });

    if (addingFuture) {
      el.appendChild(futureAddFormEl());

      const btn = document.createElement('button');
      btn.className = 'future-add-btn';
      btn.textContent = '＋ 先の予定を追加';

  // ── 日次タスク D&D ────────────────────────────────────
  function initDailyDnd() {
    ['morning','afternoon','anytime'].forEach(slot => {
      const container = document.getElementById(`${slot}-tasks`);
      if (!container) return;
      container.querySelectorAll('.task-card[data-task-id]').forEach(card => {
        card.setAttribute('draggable', 'true');
        card.addEventListener('dragstart', onDailyDragStart);
        card.addEventListener('dragend',   onDailyDragEnd);
      });
      container.removeEventListener('dragover',  onDailyDragOver);
      container.removeEventListener('dragleave', onDailyDragLeave);
      container.removeEventListener('drop',      onDailyDrop);
      container.addEventListener('dragover',  onDailyDragOver);
      container.addEventListener('dragleave', onDailyDragLeave);
      container.addEventListener('drop',      onDailyDrop);
    });
  }

  function clearDailyDndLines() {
    document.querySelectorAll('.dnd-insert-line').forEach(el => el.remove());
    document.querySelectorAll('.time-col-body.dnd-over').forEach(el => el.classList.remove('dnd-over'));
  }

  function getSlotFromContainer(container) {
    for (const slot of ['morning','afternoon','anytime']) {
      if (document.getElementById(`${slot}-tasks`) === container) return slot;
    }
    return null;
  }

  function onDailyDragStart(e) {
    const card = e.currentTarget;
    const id = parseInt(card.dataset.taskId, 10);
    const t = data.today.find(x => x.id === id);
    if (!t) return;
    dndState = { taskId: id, sourceSlot: t.slot };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(id));
    // カスタムゴースト（半透明クローン）
    const ghost = card.cloneNode(true);
    ghost.style.cssText = `position:fixed;top:-9999px;left:-9999px;width:${card.offsetWidth}px;opacity:0.7;pointer-events:none;border-radius:8px;`;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, e.offsetX, e.offsetY);
    setTimeout(() => ghost.remove(), 0);
    card.classList.add('dnd-dragging');
  }

  function onDailyDragEnd(e) {
    if (!dndState) return;  // drop 後に renderAll でリセット済みなら何もしない
    e.currentTarget.classList.remove('dnd-dragging');
    clearDailyDndLines();
    dndState = null;
  }

  function onDailyDragOver(e) {
    if (!dndState) return;
    e.preventDefault();                         // ← drop を許可するために必須
    e.dataTransfer.dropEffect = 'move';
    const container = e.currentTarget;
    container.classList.add('dnd-over');
    container.querySelectorAll('.dnd-insert-line').forEach(el => el.remove());
    const cards = [...container.querySelectorAll('.task-card[data-task-id]:not(.dnd-dragging)')];
    let insertBefore = null;
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) { insertBefore = card; break; }
    }
    const line = document.createElement('div');
    line.className = 'dnd-insert-line';
    if (insertBefore) container.insertBefore(line, insertBefore);
    else              container.appendChild(line);
  }

  function onDailyDragLeave(e) {
    const container = e.currentTarget;
    // e.relatedTarget が container の子要素の場合は発火しない（チャッタリング防止）
    if (!container.contains(e.relatedTarget)) {
      container.classList.remove('dnd-over');
      container.querySelectorAll('.dnd-insert-line').forEach(el => el.remove());
    }
  }

  function onDailyDrop(e) {
    if (!dndState) return;
    e.preventDefault();
    const prevDndState = dndState;
    dndState = null;   // renderAll ガードを解除する前にリセット
    const container = e.currentTarget;
    container.classList.remove('dnd-over');
    const targetSlot = getSlotFromContainer(container);
    if (!targetSlot) { clearDailyDndLines(); return; }
    const cards = [...container.querySelectorAll('.task-card[data-task-id]:not(.dnd-dragging)')];
    let insertBeforeId = null;
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) { insertBeforeId = parseInt(card.dataset.taskId, 10); break; }
    }
    const t = data.today.find(x => x.id === prevDndState.taskId);
    if (!t) { clearDailyDndLines(); return; }
    t.slot = targetSlot;
    const slotTasks = sortTasks(data.today.filter(x => x.slot === targetSlot && x.id !== t.id));
    const newOrder = [];
    let inserted = false;
    for (const st of slotTasks) {
      if (!inserted && st.id === insertBeforeId) { newOrder.push(t); inserted = true; }
      newOrder.push(st);
    }
    if (!inserted) newOrder.push(t);
    newOrder.forEach((task, idx) => { task.order = idx; });
    if (prevDndState.sourceSlot !== targetSlot) {
      sortTasks(data.today.filter(x => x.slot === prevDndState.sourceSlot))
        .forEach((task, idx) => { task.order = idx; });
    }
    clearDailyDndLines();
    saveData();
    renderAll();
  }

  function fmtDate(d) {

  function copyVisitsToNextMonth() {
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth();
    const monthStr = `${y}-${String(m+1).padStart(2,'0')}`;
    const visits = data.future.filter(f => f.category === 'visit' && f.date.startsWith(monthStr));
    if (visits.length === 0) {
      alert(`${m+1}月には訪問の予定がありません。`);
      return;
    }
    // 年跨ぎを Date で安全に処理（12月→1月など）
    const nextDate = new Date(y, m + 1, 1);
    const nextY = nextDate.getFullYear();
    const nextM = nextDate.getMonth();  // 0-indexed
    if (!confirm(`${m+1}月の訪問 ${visits.length}件を${nextM+1}月にコピーします。よいですか？`)) return;
    const daysInNextMonth = new Date(nextY, nextM + 1, 0).getDate();
    let copied = 0;
    let skipped = 0;
    visits.forEach(f => {
      const d = new Date(f.date + 'T00:00:00');
      const n   = Math.ceil(d.getDate() / 7);  // 第 n 週
      const dow = d.getDay();                   // 曜日（0=日〜6=土）
      const targetDay = nthWeekday(nextY, nextM, n, dow);
      if (targetDay > daysInNextMonth) { skipped++; return; }  // 第5週など存在しない日はスキップ
      const targetDate = `${nextY}-${String(nextM+1).padStart(2,'0')}-${String(targetDay).padStart(2,'0')}`;
      if (targetDate <= todayStr()) { skipped++; return; }
      if (data.future.some(x => x.date === targetDate && x.title === f.title && x.slot === f.slot)) { skipped++; return; }
      data.future.push({
        id: nextId++,
        title:    f.title,
        date:     targetDate,
        slot:     f.slot,
        category: f.category,
        priority: f.priority,
        time:     f.time,
      });
      copied++;
    });
    saveData();
    renderAll();
    let msg = `${nextM+1}月に ${copied}件コピーしました。`;
    if (skipped > 0) msg += `\n（${skipped}件は対象曜日なし・過去日のためスキップ）`;
    alert(msg);
  }

  function goCurrentMonth() {
    const n = new Date();
    currentMonth = new Date(n.getFullYear(), n.getMonth(), 1);

  function getMonthCalendarDays(year, month) {
    const first   = new Date(year, month, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayS  = todayStr();
    const days = [];
    // 前月分
    for (let i = startDow - 1; i >= 0; i--) {
      const d = new Date(year, month, -i);
      days.push({
        date: d, dateStr: fmtDate(d), inMonth: false,
        isToday: fmtDate(d) === todayS, dow: d.getDay(),
      });
    }
    // 当月分
    for (let i = 1; i <= daysInMonth; i++) {
      const d = new Date(year, month, i);
      days.push({
        date: d, dateStr: fmtDate(d), inMonth: true,
        isToday: fmtDate(d) === todayS, dow: d.getDay(),
      });
    }
    // 翌月分（6行=42セル埋まるまで）
    while (days.length < 42) {
      const last = days[days.length - 1].date;
      const d = new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1);
      days.push({
        date: d, dateStr: fmtDate(d), inMonth: false,
        isToday: fmtDate(d) === todayS, dow: d.getDay(),
      });
    }
    return days;
  }

  function getEventsForDate(dateStr) {
    const events = [];
    if (dateStr === todayStr()) {
      data.today.forEach(t => events.push({ ...t, _source: 'today' }));
    }
    data.future.filter(f => f.date === dateStr).forEach(f => events.push({ ...f, _source: 'future' }));
    return sortTasks(events);
  }
